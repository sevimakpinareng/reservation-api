# Render Blueprint — provisions a free PostgreSQL database and the API web service
# (built from the Dockerfile) in one click. Dashboard: New -> Blueprint -> pick repo -> Apply.
# Docs: https://render.com/docs/blueprint-spec

databases:
  - name: reservation-db
    region: frankfurt
    plan: free
    postgresMajorVersion: "17"

services:
  - type: web
    name: reservation-api
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      # Internal connection URL from the database above; the app converts it to
      # an Npgsql connection string on startup.
      - key: DATABASE_URL
        fromDatabase:
          name: reservation-db
          property: connectionString
      # Render generates a strong random JWT signing secret.
      - key: Jwt__Secret
        generateValue: true
      # Apply EF Core migrations automatically on first boot.
      - key: Database__MigrateOnStartup
        value: "true"
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
